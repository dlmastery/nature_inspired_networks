                    - heading "4.7 Edge ML hardware contract" [level=3] [ref=e1300]
                    - 'link "Permalink: 4.7 Edge ML hardware contract" [ref=e1301] [cursor=pointer]':
                      - /url: "#47-edge-ml-hardware-contract"
                      - img [ref=e1302]
                  - paragraph [ref=e1304]:
                    - text: The operational scale of this repo is
                    - strong [ref=e1305]: single RTX 4090 Laptop, 16-24 GB VRAM, bf16
                    - text: ". The relevant 2024-2026 hardware-software co-developments are:"
                  - list [ref=e1306]:
                    - listitem [ref=e1307]:
                      - strong [ref=e1308]: bf16 + grad-checkpointing
                      - text: as the standard 4090 training mode.
                    - listitem [ref=e1309]:
                      - strong [ref=e1310]: INT8 and INT4 quantisation
                      - text: "(bitsandbytes, GPTQ — Frantar, Ashkboos, Hoefler, Alistarh 2023 ICLR 'GPTQ: accurate post-training quantisation for generative pre-trained transformers', arXiv:2210.17323)."
                    - listitem [ref=e1311]:
                      - strong [ref=e1312]: FlashAttention-2 patches
                      - text: that make sliding-window, sparse, and hex-graph attention viable on consumer GPUs.
                    - listitem [ref=e1313]:
                      - strong [ref=e1314]: PyTorch 2.4+ compile()
                      - text: with Triton kernels.
                  - paragraph [ref=e1315]: The implication is that a 350M-parameter decoder is the practical upper bound for end-to-end pre-training on this hardware; 124M is the safer envelope. This caps H67's flagship hybrid (§ 4.10) at ~350M.
                  - generic [ref=e1316]:
                    - 'heading "4.8 Compound efficiency: status as of May 2026" [level=3] [ref=e1317]'
                    - 'link "Permalink: 4.8 Compound efficiency: status as of May 2026" [ref=e1318] [cursor=pointer]':
                      - /url: "#48-compound-efficiency-status-as-of-may-2026"
                      - img [ref=e1319]
                  - paragraph [ref=e1321]:
                    - text: The "compound efficiency" hypothesis — that combining seven nature- inspired priors yields multiplicative (20–50%) gains — was the central claim of the source PDF. This repo's
                    - code [ref=e1322]: FINDINGS.md
                    - text: 12-epoch CIFAR-10 sweep is the
                    - strong [ref=e1323]: first published rigorous test
                    - text: and is unambiguously
                    - strong [ref=e1324]: negative
                    - text: "at that scale: the full hybrid ("
                    - code [ref=e1325]: sg_full_fib
                    - text: ) is the worst row, and the H58 follow-up (max-pool → avg-pool) is also negative (-4.46 pp on
                    - code [ref=e1326]: sg_only_group_avg
                    - text: "). The 2026-current literature interpretation is:"
                  - list [ref=e1327]:
                    - listitem [ref=e1328]:
                      - strong [ref=e1329]: Some priors actively conflict.
                      - text: C4 group conv combined with toroidal padding over-smooths features; cymatic init combined with He init double-counts variance.
                    - listitem [ref=e1330]:
                      - strong [ref=e1331]: Each prior has a scale-sweet-spot.
                      - text: KAN at <1M params, hex conv at the lattice scale of the data, fractal recursion at the 2-4× residual depth.
                    - listitem [ref=e1332]:
                      - strong [ref=e1333]: Per-sub-path gating recovers the best single prior.
                      - text: H67's learned softmax gate over the five sub-paths is the operational answer to "which prior wins on this dataset?"; the gate-collapse to one-hot is the falsifier.
                  - paragraph [ref=e1334]: This nuanced status — not "compound priors win" and not "compound priors lose", but "compose them gated, ablate per axis, measure on multiple metrics" — is what this repo contributes to the field.
                  - generic [ref=e1335]:
                    - heading "4.9 On-device world models" [level=3] [ref=e1336]
                    - 'link "Permalink: 4.9 On-device world models" [ref=e1337] [cursor=pointer]':
                      - /url: "#49-on-device-world-models"
                      - img [ref=e1338]
                  - paragraph [ref=e1340]:
                    - text: The combination of JEPA latent prediction, toroidal closure, and cymatic curriculum (H68) targets the
                    - strong [ref=e1341]: on-device world-model
                    - text: "niche: a small (124M) model that learns next-latent prediction over a synthetic-physics environment on a single laptop GPU. The relevant 2024-2026 precedents are:"
                  - list [ref=e1342]:
                    - listitem [ref=e1343]:
                      - strong [ref=e1344]: Genie
                      - text: ", Bruce et al. 2024 ICML 'Genie: generative interactive environments' (arXiv:2402.15391) — generative world model trained on video data."
                    - listitem [ref=e1345]:
                      - strong [ref=e1346]: Gato
                      - text: ", Reed et al. 2022 'A generalist agent' (arXiv:2205.06175) — multi-modal agent baseline."
                    - listitem [ref=e1347]:
                      - strong [ref=e1348]: Diffusion World Model
                      - text: ", Ding, Yang, Wang 2024 'World models with diffusion', arXiv:TBD."
                    - listitem [ref=e1349]:
                      - text: The H68 specific bet is that
                      - strong [ref=e1350]: toroidal KV + cymatic curriculum + JEPA next-latent
                      - text: gives a competitive 124M world model.
                  - generic [ref=e1351]:
                    - heading "4.10 Symbolic + geometric reasoning" [level=3] [ref=e1352]
                    - 'link "Permalink: 4.10 Symbolic + geometric reasoning" [ref=e1353] [cursor=pointer]':
                      - /url: "#410-symbolic--geometric-reasoning"
                      - img [ref=e1354]
                  - paragraph [ref=e1356]:
                    - text: KAN's symbolic-regression capability (Liu et al. 2024 op. cit.) and the Metatron-Cube fixed graph topology (H23 / H40 / H69) combine into a candidate for
                    - strong [ref=e1357]: interpretable scientific reasoning
                    - text: ": the backbone is a vanilla decoder, the head is a KAN-on-Metatron that emits human-readable formulae for GSM8K, ARC, and Feynman-equation benchmarks. The 2024-2026 precedents include AlphaGeometry (Trinh, Wu, Le, He, Luong 2024 Nature 'Solving olympiad geometry without human demonstrations', 625:476-482) and FunSearch (Romera-Paredes et al. 2024 Nature, 625:468-475), which both use symbolic-search loops on top of neural backbones."
                  - generic [ref=e1358]:
                    - heading "4.11 What is \"up for grabs\" in 2026" [level=3] [ref=e1359]
