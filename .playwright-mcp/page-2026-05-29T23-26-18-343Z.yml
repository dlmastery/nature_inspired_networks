                  - paragraph [ref=e1381]:
                    - text: The 2026 frontier is the
                    - strong [ref=e1382]: composition
                    - text: of these axes, not the single-axis experiments. The autoresearch protocol's discipline — Citation Rigor + Goodhart fingerprint + append-only log + per-axis Pareto criterion — is what enables that composition to be reported honestly.
