                      - strong [ref=e1182]: SE(3)-Diffuser
                      - text: (Yim, Trippe, De Bortoli, Mathieu, Doucet, Barzilay, Jaakkola 2023 ICML, arXiv:2302.02277) — SE(3)-equivariant diffusion for protein backbone generation.
                    - listitem [ref=e1183]:
                      - strong [ref=e1184]: EquiFormer
                      - text: (Liao and Smidt 2023 ICLR, arXiv:2206.11990) and
                      - strong [ref=e1185]: EquiFormerV2
                      - text: (Liao, Wood, Das, Smidt 2024 ICLR, arXiv:2306.12059) — high-degree spherical-harmonic transformers for materials.
                    - listitem [ref=e1186]:
                      - strong [ref=e1187]: GotenNet
                      - text: (Liao et al. 2025, arXiv:TBD) — generalised tensor-product transformer.
                  - paragraph [ref=e1188]:
                    - text: These are competitive with or ahead of e3nn on QM9, OC20, and MD17. The 2026 frontier is
                    - strong [ref=e1189]: combining equivariance with linear- attention
                    - text: (FlashAttention-2 patches + group action), which is the operational target for H71 (icosa RoPE × Transformer).
