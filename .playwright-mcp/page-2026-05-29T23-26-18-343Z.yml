                  - paragraph [ref=e1201]:
                    - text: Liquid Foundation Models trace back to
                    - strong [ref=e1202]: Liquid Time-Constant networks
                    - text: (Hasani, Lechner, Amini, Rus, Grosu 2021 AAAI 'Liquid time-constant networks', arXiv:2006.04439), inspired by the
                    - emphasis [ref=e1203]: C. elegans
                    - text: nervous system. The recurrence relation is an explicit ODE dx/dt = -x/τ(t) + f(x, u, t), allowing learnable continuous time-constants τ. The 2024-2025 generation
                    - strong [ref=e1204]: LFM2
                    - text: "(Liquid AI 2025 'LFM2: hybrid edge-first foundation model', arXiv:2511.23404) ships production models at 1B-7B parameters with:"
                  - list [ref=e1205]:
                    - listitem [ref=e1206]: "Hybrid architecture: gated convolution blocks + grouped-query attention."
                    - listitem [ref=e1207]:
                      - strong [ref=e1208]: 2× CPU prefill and decode throughput
                      - text: vs comparable Transformers.
                    - listitem [ref=e1209]:
                      - strong [ref=e1210]: 192 MB KV cache at 32k context
                      - text: (vs ~600 MB for vanilla GPT-2 at the same context).
                    - listitem [ref=e1211]: Top-K knowledge distillation as the production training innovation.
                    - listitem [ref=e1212]: Edge deployment to phones, laptops, and Raspberry Pi.
                  - paragraph [ref=e1213]:
                    - text: The sacred-geometry contribution along this axis (H61) is the
                    - strong [ref=e1214]: φ-spaced LTC bank
                    - text: ": τ_k = τ_0 · φ^k for k = 0…n, giving a logarithmically-spaced time-constant bank with minimal redundancy."
                  - generic [ref=e1215]:
                    - heading "4.2 The JEPA family" [level=3] [ref=e1216]
                    - 'link "Permalink: 4.2 The JEPA family" [ref=e1217] [cursor=pointer]':
                      - /url: "#42-the-jepa-family"
                      - img [ref=e1218]
                  - paragraph [ref=e1220]:
                    - text: Joint-Embedding Predictive Architectures predict in
                    - strong [ref=e1221]: latent space
                    - text: rather than pixel space, eliminating the texture-memorisation problem that plagues pixel-MSE self-supervision.
                  - list [ref=e1222]:
                    - listitem [ref=e1223]:
                      - strong [ref=e1224]: I-JEPA
                      - text: ", Assran, Duval, Misra, Bojanowski, Vincent, Rabbat, LeCun, Ballas 2023 CVPR 'Self-supervised learning from images with a joint-embedding predictive architecture' (arXiv:2301.08243) — image-level JEPA; predicts masked-patch features from visible-patch features."
                    - listitem [ref=e1225]:
                      - strong [ref=e1226]: V-JEPA
                      - text: ", Bardes, Ponce, LeCun et al. 2024 ICLR 'V-JEPA: latent video prediction for visual representation learning' (arXiv:2404.08471) — extends JEPA to video; 1.5-6× sample efficiency over pixel baselines."
                    - listitem [ref=e1227]:
                      - strong [ref=e1228]: V-JEPA 2
                      - text: ", Bardes, Ponce et al. 2025 'V-JEPA 2: scaling self-supervised video prediction' (arXiv:2506.09985) — current state-of-the-art self-supervised video model; 1B parameters, trained on hundreds of millions of clips."
                    - listitem [ref=e1229]:
                      - strong [ref=e1230]: seq-JEPA
                      - text: ", recent NeurIPS 2025 paper on sequential JEPA for long-horizon prediction (arXiv:TBD — to be verified). Adds an explicit autoregressive layer on top of JEPA latents."
                    - listitem [ref=e1231]:
                      - strong [ref=e1232]: LLM-JEPA experiments
                      - text: ", Meta AI 2025 internal preprints — early evidence that JEPA-style auxiliary losses help LLM pre-training efficiency. (arXiv:TBD)"
                  - paragraph [ref=e1233]:
                    - text: The sacred-geometry contribution along this axis (H61, H63, H65) is the addition of a
                    - strong [ref=e1234]: fixed-geometric target
                    - text: (dodecahedral projection) alongside the EMA-momentum target, providing a stationary anchor that prevents EMA drift.
                  - generic [ref=e1235]:
                    - heading "4.3 Kolmogorov-Arnold Networks (KAN)" [level=3] [ref=e1236]
                    - 'link "Permalink: 4.3 Kolmogorov-Arnold Networks (KAN)" [ref=e1237] [cursor=pointer]':
                      - /url: "#43-kolmogorov-arnold-networks-kan"
                      - img [ref=e1238]
                  - list [ref=e1240]:
                    - listitem [ref=e1241]:
                      - strong [ref=e1242]: KAN
                      - text: ", Liu, Wang, Vaidya, Ruehle, Halverson, Soljačić, Hou, Tegmark 2024 NeurIPS 'KAN: Kolmogorov-Arnold Networks' (arXiv:2404.19756) — inverts the location of the non-linearity from nodes (MLP) to edges, learning a B-spline per edge. Reports 10-100× parameter-efficiency on symbolic regression and low-D physics tasks."
                    - listitem [ref=e1243]:
                      - strong [ref=e1244]: KAN 2.0
                      - text: ", Liu et al. 2024 'KAN 2.0: Kolmogorov-Arnold networks meet science' (arXiv:2408.10205) — adds symbolic-discovery pipelines ("
                      - code [ref=e1245]: suggest_symbolic
                      - text: ) and improves stability.
                    - listitem [ref=e1246]:
                      - text: "The scaling problem: KAN's edge-spline parameter density does not scale well; large KANs (≥10M params) lose the efficiency advantage. H69 (KAN as a symbolic"
                      - emphasis [ref=e1247]: head
                      - text: on top of a vanilla Transformer
                      - emphasis [ref=e1248]: backbone
                      - text: ) is this repo's proposed mitigation.
