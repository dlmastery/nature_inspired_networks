                  - paragraph [ref=e1363]: "Three frontier opportunities are recognised but largely untested:"
                  - list [ref=e1364]:
                    - listitem [ref=e1365]:
                      - strong [ref=e1366]: Full Sacred-Liquid-JEPA-KAN-GNN-Transformer hybrid
                      - text: (H67 in this repo) — the synthesis claim. No published paper attempts the five-paradigm gated composition.
                    - listitem [ref=e1367]:
                      - strong [ref=e1368]: On-device world models
                      - text: with toroidal closure and cymatic curriculum (H68) — Genie and DWM exist, but none use sacred-geometry priors.
                    - listitem [ref=e1369]:
                      - strong [ref=e1370]: Symbolic + geometric reasoning
                      - text: via KAN-on-Metatron (H69) — AlphaGeometry and FunSearch are the closest neighbours, but neither uses a fixed sacred-geometry head topology.
                  - paragraph [ref=e1371]: "Beyond these three, the field is wide open along the following axes:"
                  - list [ref=e1372]:
                    - listitem [ref=e1373]:
                      - strong [ref=e1374]: Compositional persistent-homology losses
                      - text: as auxiliary loss terms (H65) for grokking acceleration.
                    - listitem [ref=e1375]:
                      - strong [ref=e1376]: Cymatic curriculum for low-data regimes
                      - text: (H70) as a retinal-wave analogue for early training.
                    - listitem [ref=e1377]:
                      - strong [ref=e1378]: Icosahedral RoPE
