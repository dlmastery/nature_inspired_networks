                  - list [ref=e3543]:
                    - listitem [ref=e3544]:
                      - strong [ref=e3545]: Betti number β_k
                      - text: — count of k-dimensional holes in a topological space. β₀ = connected components, β₁ = loops, β₂ = voids.
                    - listitem [ref=e3546]:
                      - strong [ref=e3547]: Binet's formula
                      - text: — closed-form expression for the n-th Fibonacci number using φ.
                    - listitem [ref=e3548]:
                      - strong [ref=e3549]: C4 group / C₆ group
                      - text: — cyclic rotation groups of order 4 and 6.
                    - listitem [ref=e3550]:
                      - strong [ref=e3551]: Chladni mode
                      - text: — eigenmode of the 2-D wave equation on a plate; visualisable by sand patterns on a vibrating surface.
                    - listitem [ref=e3552]:
                      - strong [ref=e3553]: CKA — Centered Kernel Alignment
                      - text: — similarity measure between representations of two neural networks.
                    - listitem [ref=e3554]:
                      - strong [ref=e3555]: EMA — Exponential Moving Average
                      - text: — JEPA's target-encoder update rule with momentum m ≈ 0.999.
                    - listitem [ref=e3556]:
                      - strong [ref=e3557]: Equivariance
                      - text: — a layer's output transforms predictably under a symmetry of its input.
                    - listitem [ref=e3558]:
                      - strong [ref=e3559]: Filtration
                      - text: — nested sequence of simplicial complexes at increasing scale, used in persistent homology.
                    - listitem [ref=e3560]:
                      - strong [ref=e3561]: Fibonacci sequence
                      - text: — 1, 1, 2, 3, 5, 8, 13, …; ratio → φ.
                    - listitem [ref=e3562]:
                      - strong [ref=e3563]: Fractal dimension D
                      - text: — log N(ε) / log(1/ε), measure of how detail scales with resolution.
                    - listitem [ref=e3564]:
                      - strong [ref=e3565]: GDL — Geometric Deep Learning
                      - text: — unified framework for CNN / GNN / Transformer / equivariant via grids, groups, graphs, geodesics, gauges.
                    - listitem [ref=e3566]:
                      - strong [ref=e3567]: Golden angle θ
                      - text: — 2π(1 − 1/φ) ≈ 137.5°.
                    - listitem [ref=e3568]:
                      - strong [ref=e3569]: Golden ratio φ
                      - text: — (1 + √5)/2 ≈ 1.618; most irrational number.
                    - listitem [ref=e3570]:
                      - strong [ref=e3571]: Grid cells
                      - text: — entorhinal neurons firing on a hex lattice tiling of allocentric space.
                    - listitem [ref=e3572]:
                      - strong [ref=e3573]: Icosahedral group I
                      - text: — rotation group of the icosahedron, order 60; largest finite subgroup of SO(3).
                    - listitem [ref=e3574]:
                      - strong [ref=e3575]: JEPA — Joint-Embedding Predictive Architecture
                      - text: — Meta's family of latent-prediction self-supervised models.
                    - listitem [ref=e3576]:
                      - strong [ref=e3577]: KAN — Kolmogorov-Arnold Network
                      - text: — MLP variant with non- linearities on edges (B-splines) instead of nodes.
                    - listitem [ref=e3578]:
                      - strong [ref=e3579]: KV cache
                      - text: — key-value tensors stored across autoregressive decoding steps; dominant inference memory cost at long context.
                    - listitem [ref=e3580]:
                      - strong [ref=e3581]: LFM2 — Liquid Foundation Model 2
                      - text: — Liquid AI's 2025 hybrid edge-first foundation model family.
                    - listitem [ref=e3582]:
                      - strong [ref=e3583]: LTC — Liquid Time-Constant network
                      - text: — RNN with learnable continuous τ.
                    - listitem [ref=e3584]:
                      - strong [ref=e3585]: Mamba
                      - text: — selective state-space model; linear-time alternative to attention.
                    - listitem [ref=e3586]:
                      - strong [ref=e3587]: Metatron's Cube
                      - text: — sacred-geometric figure with 13 vertices and 78 edges; used here as a fixed graph topology for the KAN head.
                    - listitem [ref=e3588]:
                      - strong [ref=e3589]: MLA — Multi-Head Latent Attention
                      - text: — DeepSeek-V2's low-rank KV compression.
                    - listitem [ref=e3590]:
                      - strong [ref=e3591]: PH — Persistent Homology
                      - text: — computation of Betti numbers across a filtration.
                    - listitem [ref=e3592]:
                      - strong [ref=e3593]: Phyllotaxis
                      - text: — arrangement of leaves / florets at the golden angle on a growing disk.
                    - listitem [ref=e3594]:
                      - strong [ref=e3595]: Platonic solid
                      - text: — convex regular polyhedron; there are exactly five.
                    - listitem [ref=e3596]:
                      - strong [ref=e3597]: Platonic Representation Hypothesis (PRH)
                      - text: "— Huh et al. 2024: sufficiently large encoders across modalities and objectives converge to a shared statistical model of reality."
                    - listitem [ref=e3598]:
                      - strong [ref=e3599]: RoPE — Rotary Position Embedding
                      - text: — Su et al. 2021 positional encoding via rotation in complex 2-D sub-spaces.
                    - listitem [ref=e3600]:
                      - strong [ref=e3601]: SO(3) / SE(3)
                      - text: — group of 3-D rotations / 3-D rigid motions.
                    - listitem [ref=e3602]:
                      - strong [ref=e3603]: Toroidal padding
                      - text: — circular wrap padding for convolution, giving the input the topology of a torus.
                    - listitem [ref=e3604]:
                      - strong [ref=e3605]: Wythoff array
                      - text: — Fibonacci-related integer array; basis for Fibottention's dilation pattern.
