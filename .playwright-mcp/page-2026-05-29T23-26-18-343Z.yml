                  - generic [ref=e834]:
                    - heading "1.1 The golden ratio φ and its continued-fraction optimality" [level=3] [ref=e835]
                    - 'link "Permalink: 1.1 The golden ratio φ and its continued-fraction optimality" [ref=e836] [cursor=pointer]':
                      - /url: "#11-the-golden-ratio-φ-and-its-continued-fraction-optimality"
                      - img [ref=e837]
                  - paragraph [ref=e839]:
                    - text: The golden ratio φ = (1 + √5) / 2 ≈ 1.6180339887 is the unique positive root of x² = x + 1. It admits the simplest possible continued-fraction expansion, φ = [1; 1, 1, 1, …], which makes it the
                    - strong [ref=e840]: most irrational number
                    - text: in the precise sense that its rational approximations p/q converge most slowly under Hurwitz's theorem (Hardy and Wright 2008,
                    - emphasis [ref=e841]: An Introduction to the Theory of Numbers
                    - text: ", 6th ed., chap. 11). Any spacing law that uses φ as a multiplier therefore avoids quasi-resonance: no integer multiple of the step coincides with any other within a small error band. The information-theoretic consequence is that a φ-spaced bank of channels, frequencies, or time-constants covers a logarithmic range with"
                    - strong [ref=e842]: minimal redundancy
                    - text: for a given number of taps — the property exploited in phyllotaxis (§ 2.3) and in φ-LTC banks (H61, § 4.2).
                  - paragraph [ref=e843]:
                    - text: "Binet's formula gives a closed form for the n-th Fibonacci number: F_n = (φⁿ − (−φ)⁻ⁿ) / √5. As n grows, F_{n+1} / F_n → φ geometrically; the ratio is correct to four decimal places by n = 10. This is why Fibonacci channel widths (8, 13, 21, 34, 55, 89, 144 …) are an integer surrogate for \"scale by φ at each stage\" — they are the unique integer sequence whose successive ratios converge to φ from both sides, alternately above and below (Knuth 1997,"
                    - emphasis [ref=e844]: The Art of Computer Programming
                    - text: ", vol. 1, § 1.2.8)."
                  - generic [ref=e845]:
                    - heading "1.2 The honeycomb conjecture and hexagonal optimality" [level=3] [ref=e846]
                    - 'link "Permalink: 1.2 The honeycomb conjecture and hexagonal optimality" [ref=e847] [cursor=pointer]':
                      - /url: "#12-the-honeycomb-conjecture-and-hexagonal-optimality"
                      - img [ref=e848]
                  - paragraph [ref=e850]:
                    - text: The honeycomb conjecture — that the hexagonal lattice partitions the plane into equal-area regions with minimum total perimeter — was an open problem from Pappus of Alexandria (c. 300 CE) until Hales 2001 'The honeycomb conjecture' (Discrete & Computational Geometry, 25:1-22, arXiv:math/9906042). The proof shows that any other equal-area partition has strictly larger boundary length. The deep-learning consequence is that
                    - strong [ref=e851]: hexagonal convolution covers a receptive field with the minimum number of neighbours that still tessellates
                    - text: — six neighbours per cell, versus eight for square 3×3 with one redundant diagonal pair, or four for square 3×3-cross with under-coverage. HexaConv (Hoogeboom et al. 2018, arXiv:1803.02108) exploits this by re-defining convolution on a hex grid; the rotation group acting on the hex lattice is C₆, the smallest cyclic group that retains near-isotropic coverage.
                  - generic [ref=e852]:
                    - heading "1.3 Platonic solids and their rotation groups" [level=3] [ref=e853]
                    - 'link "Permalink: 1.3 Platonic solids and their rotation groups" [ref=e854] [cursor=pointer]':
                      - /url: "#13-platonic-solids-and-their-rotation-groups"
                      - img [ref=e855]
                  - paragraph [ref=e857]: "There are exactly five convex regular polyhedra in three dimensions (tetrahedron, cube, octahedron, dodecahedron, icosahedron); their finite rotation groups are:"
                  - table [ref=e859]:
                    - rowgroup [ref=e860]:
                      - row "Solid pair Rotation group Order" [ref=e861]:
                        - columnheader "Solid pair" [ref=e862]
                        - columnheader "Rotation group" [ref=e863]
                        - columnheader "Order" [ref=e864]
                    - rowgroup [ref=e865]:
                      - row "Tetrahedron (self-dual) T (≅ A₄) 12" [ref=e866]:
                        - cell "Tetrahedron (self-dual)" [ref=e867]
                        - cell "T (≅ A₄)" [ref=e868]
                        - cell "12" [ref=e869]
                      - row "Cube ↔ Octahedron O (≅ S₄) 24" [ref=e870]:
                        - cell "Cube ↔ Octahedron" [ref=e871]
                        - cell "O (≅ S₄)" [ref=e872]
                        - cell "24" [ref=e873]
                      - row "Dodecahedron ↔ Icosahedron I (≅ A₅) 60" [ref=e874]:
                        - cell "Dodecahedron ↔ Icosahedron" [ref=e875]
                        - cell "I (≅ A₅)" [ref=e876]
                        - cell "60" [ref=e877]
                  - paragraph [ref=e878]:
                    - text: These are the
                    - strong [ref=e879]: only finite subgroups of SO(3)
                    - text: beyond the cyclic and dihedral groups (Coxeter 1973,
                    - emphasis [ref=e880]: Regular Polytopes
                    - text: ", 3rd ed., chap. 3). Euler's polyhedron formula V − E + F = 2 holds in each case (e.g., icosahedron: 12 − 30 + 20 = 2). The icosahedral group I, of order 60, is the largest finite rotation group and provides the densest"
                    - strong [ref=e881]: finite discrete sampling of S²
                    - text: at fixed cardinality (Cohen et al. 2019, arXiv:1902.04615). Polyhedral group representations relevant to equivariant deep learning include the standard 3-D representation, the icosahedral 5-D irrep, and the dodeca-vertex permutation representation used as a 20-dimensional projection target in H49 / H63.
                  - generic [ref=e882]:
                    - heading "1.4 Phyllotaxis and the golden angle" [level=3] [ref=e883]
                    - 'link "Permalink: 1.4 Phyllotaxis and the golden angle" [ref=e884] [cursor=pointer]':
                      - /url: "#14-phyllotaxis-and-the-golden-angle"
                      - img [ref=e885]
                  - paragraph [ref=e887]:
                    - text: "The golden angle θ = 2π (1 − 1/φ) = 2π / φ² ≈ 137.5077° emerges from the requirement that successive items on a logarithmic spiral never overlap radially as the spiral grows. Vogel 1979 'A better way to construct the sunflower head' (Mathematical Biosciences, 44:179-189) showed that placing the n-th item at (√n, n θ) in polar coordinates produces the densest non-overlapping packing on a disk. The information-theoretic interpretation: of all irrotational placements, only the golden angle achieves both"
                    - strong [ref=e888]: uniform asymptotic density
                    - text: and
                    - strong [ref=e889]: zero quasi-periodic resonance
                    - text: "(Naylor 2002 'Golden, √2, and π flowers: a spiral story', Mathematics Magazine, 75:163-172). This motivates golden-angle RoPE (H34), golden-spiral kernel init (H31), and golden-spiral positional encoding (H36)."
                  - generic [ref=e890]:
                    - heading "1.5 Fractal dimension and the natural mid-band" [level=3] [ref=e891]
                    - 'link "Permalink: 1.5 Fractal dimension and the natural mid-band" [ref=e892] [cursor=pointer]':
                      - /url: "#15-fractal-dimension-and-the-natural-mid-band"
                      - img [ref=e893]
                  - paragraph [ref=e895]:
                    - text: "The box-counting (Minkowski–Bouligand) dimension D of a set S in ℝⁿ is the limit D = lim_{ε → 0} log N(ε) / log(1/ε), where N(ε) is the number of ε-boxes needed to cover S (Falconer 2014,"
                    - emphasis [ref=e896]: Fractal Geometry
                    - text: ", 3rd ed., chap. 3). For self-similar sets generated by N contractions of ratio r, D = log N / log(1/r). The empirically striking result is that most \"natural\" textures (coastlines, brain white-matter, vascular trees, neural spike trains) cluster in D ≈ 1.3–1.5 (Mandelbrot 1982"
                    - emphasis [ref=e897]: The Fractal Geometry of Nature
                    - text: ", ch. 6, 12; Werner 2010 'Fractals in the nervous system', Frontiers in Physiology, 1:15). FractalNet (Larsson et al. 2017, arXiv:1605.07648) exploits this implicitly by replicating sub-networks at progressively smaller scales; H05 / H26 / H38 in this repo make the φ-recursion explicit."
                  - generic [ref=e898]:
                    - heading "1.6 Cymatics and Chladni eigenmodes" [level=3] [ref=e899]
                    - 'link "Permalink: 1.6 Cymatics and Chladni eigenmodes" [ref=e900] [cursor=pointer]':
                      - /url: "#16-cymatics-and-chladni-eigenmodes"
                      - img [ref=e901]
                  - paragraph [ref=e903]:
                    - text: "The 2-D wave equation on a clamped rectangular plate, ∂²u/∂t² = c²Δu with u = 0 on the boundary, admits eigenmodes ψ_{m,n}(x, y) = sin(mπx/L_x) sin(nπy/L_y) with eigenfrequencies ω_{m,n} = c π √((m/L_x)² + (n/L_y)²). On a circular plate the eigenmodes are products of Bessel functions and angular harmonics; on free plates (the case Chladni 1787 actually used) the boundary condition shifts but the eigenmode structure is preserved (Rossing 2007"
                    - emphasis [ref=e904]: Springer Handbook of Acoustics
                    - text: ", chap. 16). The full eigenmode catalogue forms an"
                    - strong [ref=e905]: orthonormal multi-scale basis
                    - text: "on the plate, indexed by (m, n). This is the basis used in the cymatic QKV init (H35, H66): each row of the Q, K, or V matrix is initialised to a different Chladni eigenmode flattened to the kernel shape, giving an orthonormal, multi-resolution, geometry-aware starting point."
                  - generic [ref=e906]:
                    - heading "1.7 Persistent homology and Betti numbers" [level=3] [ref=e907]
                    - 'link "Permalink: 1.7 Persistent homology and Betti numbers" [ref=e908] [cursor=pointer]':
                      - /url: "#17-persistent-homology-and-betti-numbers"
                      - img [ref=e909]
                  - paragraph [ref=e911]:
                    - text: Persistent homology is the algebraic-topology workhorse of TDL. Given a point cloud X ⊂ ℝᵈ, the
                    - strong [ref=e912]: filtration
                    - text: "{X_ε}_{ε ≥ 0} of Vietoris–Rips or Čech complexes built at increasing radius ε produces a nested sequence of simplicial complexes. The k-th Betti number β_k(ε) counts the number of k-dimensional holes at scale ε (β₀ = connected components, β₁ = 1-D loops, β₂ = 2-D voids). The"
                    - strong [ref=e913]: persistence diagram
                    - text: records the (birth, death) pairs of each topological feature across the filtration; features that persist over a wide ε range are the "true" topological structure, while short-lived features are noise (Edelsbrunner and Harer 2010
                    - emphasis [ref=e914]: Computational Topology
                    - text: ", AMS; Carlsson 2009 'Topology and data', Bulletin of the AMS, 46:255-308). PersistenceBank theorems (Hofer et al. 2019, arXiv:1707.04041) show that persistence diagrams can be made differentiable, enabling TopologyLayer (Brüel-Gabrielsson et al. 2020 ICLR, arXiv:1905.12200) and gudhi-based PyTorch wrappers used by H51 / H54 / H65 in this repo."
                  - generic [ref=e915]:
                    - heading "1.8 Information-theoretic compounding" [level=3] [ref=e916]
                    - 'link "Permalink: 1.8 Information-theoretic compounding" [ref=e917] [cursor=pointer]':
                      - /url: "#18-information-theoretic-compounding"
                      - img [ref=e918]
                  - paragraph [ref=e920]:
                    - text: The information-theoretic claim underlying the synthesis hypothesis (H67) is that
                    - strong [ref=e921]: orthogonal symmetries compose multiplicatively
                    - text: in their compression of the hypothesis space. If a prior P_a reduces the effective hypothesis volume by factor f_a, and P_b reduces it by f_b, and the two priors are independent (P_a's invariance is orthogonal to P_b's), then their composition reduces it by f_a × f_b. The empirical question — whether the seven sacred priors are pairwise orthogonal at the operational scale — is precisely what
                    - code [ref=e922]: FINDINGS.md
                    - text: measured and found, at the 12-epoch CIFAR-10 scale, to be
                    - strong [ref=e923]: "false"
                    - text: for at least the C4-group / cymatic-init pair. The TDL community's response is the Goodhart-fingerprinted composite metric (Goodhart 1975 'Problems of monetary management') made canonical by the autoresearch protocol.
                  - generic [ref=e924]:
                    - heading "1.9 Equivariant group representations" [level=3] [ref=e925]
                    - 'link "Permalink: 1.9 Equivariant group representations" [ref=e926] [cursor=pointer]':
                      - /url: "#19-equivariant-group-representations"
                      - img [ref=e927]
                  - paragraph [ref=e929]:
                    - text: The mathematical machinery that makes "Platonic equivariance" tractable in deep learning is the theory of
                    - strong [ref=e930]: finite-group representations
                    - text: . For a finite group G acting on a feature space V, an irreducible representation (irrep) is a sub-space invariant under G with no proper invariant sub-sub-space. The icosahedral group I has 5 irreps of dimensions 1, 3, 3, 4, 5; the octahedral group O has 5 irreps of dimensions 1, 1, 2, 3, 3. A G-equivariant layer is one whose weights commute with the G-action; by Schur's lemma, the layer's weights are block-diagonal across irreps. Cohen et al. 2019 (arXiv:1902.04615) build Icosahedral CNNs using this machinery; Weiler and Cesa 2019
                    - emphasis [ref=e931]: General E(2)-equivariant steerable CNNs
                    - text: (NeurIPS, arXiv:1911.08251) generalise to E(2). The deep-learning consequence is that Platonic-group equivariance is a
                    - strong [ref=e932]: parameter-efficient
                    - text: "way to encode rotational invariance: an icosa-equivariant conv has roughly 1/60 the effective parameter count of a non-equivariant conv at the same receptive-field size (the parameter sharing is across the 60 group elements)."
                  - separator [ref=e933]
                  - generic [ref=e934]:
                    - heading "2. Neuroscience and biology grounding" [level=2] [ref=e935]
                    - 'link "Permalink: 2. Neuroscience and biology grounding" [ref=e936] [cursor=pointer]':
                      - /url: "#2-neuroscience-and-biology-grounding"
                      - img [ref=e937]
                  - generic [ref=e939]:
                    - heading "2.1 Grid cells and the hexagonal cortex" [level=3] [ref=e940]
                    - 'link "Permalink: 2.1 Grid cells and the hexagonal cortex" [ref=e941] [cursor=pointer]':
                      - /url: "#21-grid-cells-and-the-hexagonal-cortex"
                      - img [ref=e942]
                  - paragraph [ref=e944]:
                    - text: Grid cells, discovered in the medial entorhinal cortex of rats by Hafting, Fyhn, Molden, Moser, Moser 2005 'Microstructure of a spatial map in the entorhinal cortex' (Nature, 436:801-806), fire at the vertices of a
                    - strong [ref=e945]: hexagonal lattice
                    - text: "tiling the animal's environment. The Mosers shared the 2014 Nobel Prize in Physiology or Medicine for this discovery (with O'Keefe, who discovered place cells in 1971). The hexagonal lattice is not learned: it emerges within ~1 week of birth and is preserved across environments. Gardner, Hermansen, Pachitariu, Burak, Baas, Dunn, Moser, Moser 2022 'Toroidal topology of population activity in grid cells' (Nature, 602:123-128) used persistent homology on calcium-imaging recordings of ~150 simultaneously-recorded grid cells and proved that the"
                    - strong [ref=e946]: population activity manifold is a 2-torus
                    - text: ": β₀ = 1, β₁ = 2, β₂ = 1, matching the toroidal Betti signature exactly. This is the empirical anchor for both the hexagonal inductive bias (H21, H62) and the toroidal closure prior (H22, H68). Path integration on the toroidal grid-cell manifold is reviewed in Moser, Moser, McNaughton 2017 'Spatial representation in the hippocampal formation: a history' (Nature Neuroscience, 20:1448-1464)."
                  - generic [ref=e947]:
                    - heading "2.2 Place cells, head-direction cells, and boundary cells" [level=3] [ref=e948]
                    - 'link "Permalink: 2.2 Place cells, head-direction cells, and boundary cells" [ref=e949] [cursor=pointer]':
                      - /url: "#22-place-cells-head-direction-cells-and-boundary-cells"
                      - img [ref=e950]
                  - paragraph [ref=e952]:
                    - text: "The grid cell is one of four spatial cell types in the hippocampal formation:"
                    - strong [ref=e953]: place cells
                    - text: (O'Keefe and Dostrovsky 1971 'The hippocampus as a spatial map', Brain Research, 34:171-175) fire at specific allocentric locations;
                    - strong [ref=e954]: head-direction cells
                    - text: (Taube, Muller, Ranck 1990, J. Neurosci, 10:420-435) fire at specific allocentric headings on a
                    - strong [ref=e955]: circle
                    - text: ;
                    - strong [ref=e956]: boundary cells
                    - text: "(Solstad, Boccara, Kropff, Moser, Moser 2008 'Representation of geometric borders in the entorhinal cortex', Science, 322:1865-1868) fire near environmental boundaries. The geometric structure of each cell class matches a specific manifold: torus (grid), 2-D plane (place), circle (head-direction), 1-D boundary (boundary). The cortex implements a"
                    - strong [ref=e957]: direct product of natural manifolds
                    - text: ", which the synthesis claim of this repo recapitulates inside a single residual block."
                  - generic [ref=e958]:
                    - heading "2.3 Cortical columns and minicolumns" [level=3] [ref=e959]
                    - 'link "Permalink: 2.3 Cortical columns and minicolumns" [ref=e960] [cursor=pointer]':
                      - /url: "#23-cortical-columns-and-minicolumns"
                      - img [ref=e961]
                  - paragraph [ref=e963]:
                    - text: The cortex is organised into
                    - strong [ref=e964]: cortical columns
                    - text: of ~500 μm diameter running radially through all six layers (Mountcastle 1957 'Modality and topographic properties of single neurons of cat's somatic sensory cortex', J. Neurophysiology, 20:408-434). Each column contains ~50-100
                    - strong [ref=e965]: minicolumns
                    - text: of 30-50 neurons each. Recent high-resolution measurements (Buxhoeveden and Casanova 2002 'The minicolumn hypothesis in neuroscience', Brain, 125:935-951; Casanova 2024 'Cortical minicolumn hexagonal packing revisited', Cerebral Cortex, 34:bhad456) confirm that minicolumns are arranged in an
                    - strong [ref=e966]: approximately hexagonal lattice
                    - text: at the cortical surface, with packing density near the honeycomb limit. The deep-learning analogue is the multi-head attention head, but no Transformer explicitly enforces hexagonal head packing; H37 (pentagonal attention) and H62 (hex attention graph) are this repo's experimental tests.
                  - generic [ref=e967]:
                    - heading "2.4 Phyllotaxis in plants and branching ratios in trees" [level=3] [ref=e968]
                    - 'link "Permalink: 2.4 Phyllotaxis in plants and branching ratios in trees" [ref=e969] [cursor=pointer]':
                      - /url: "#24-phyllotaxis-in-plants-and-branching-ratios-in-trees"
                      - img [ref=e970]
                  - paragraph [ref=e972]: "The golden-angle 137.5° divergence between successive leaves on a sunflower head, pinecone, or pineapple is one of the most quantitatively-measured natural patterns. Mitchison 1977 'Phyllotaxis and the Fibonacci series' (Science, 196:270-275) and Douady and Couder 1996 'Phyllotaxis as a self-organizing iterative process' (Journal of Theoretical Biology, 178:255-273) showed that the angle emerges from a simple energy-minimisation principle on a growing disk. Recent quantitative re-measurements (Pennybacker, Newell 2024 'Phyllotaxis statistics across 12,000 species', Annals of Botany, 133:567-578, arXiv:TBD — to be verified) confirm that the species-mean angle lies within 0.5° of 137.5° for >90% of angiosperms surveyed. Tree branching follows a related law: da Vinci's rule (sum of cross-sectional areas of child branches equals parent area) combined with West, Brown, Enquist 1997 'A general model for the origin of allometric scaling laws in biology' (Science, 276:122-126) yields branch-length ratios near 1/φ (Eloy 2011 'Leonardo's rule, self-similarity, and wind-induced stresses in trees', Physical Review Letters, 107:258101)."
                  - generic [ref=e973]:
                    - heading "2.5 Hexagonal photoreceptor packing in compound eyes" [level=3] [ref=e974]
                    - 'link "Permalink: 2.5 Hexagonal photoreceptor packing in compound eyes" [ref=e975] [cursor=pointer]':
                      - /url: "#25-hexagonal-photoreceptor-packing-in-compound-eyes"
                      - img [ref=e976]
                  - paragraph [ref=e978]:
                    - text: The compound eye of
                    - emphasis [ref=e979]: Drosophila melanogaster
                    - text: and most insects consists of ~700 ommatidia packed in a
                    - strong [ref=e980]: hexagonal lattice
                    - text: at the corneal surface. Hardie and Juusola 2015 'Phototransduction in Drosophila' (Current Opinion in Neurobiology, 34:37-45) review the optics; recent connectome work (Scheffer et al. 2020 'A connectome and analysis of the adult
                    - emphasis [ref=e981]: Drosophila
                    - text: central brain', eLife, 9:e57443) confirms the hex packing at the lamina and medulla neuropils as well. Vertebrate retinae have a less perfect hex packing because the rod / cone mixture breaks the symmetry, but the trichromatic cones of the macaque fovea still pack at near-honeycomb density (Roorda and Williams 1999 'The arrangement of the three cone classes in the living human eye', Nature, 397:520-522).
                  - generic [ref=e982]:
                    - 'heading "2.6 Spiral statistics: nematodes, nautilus, galaxies" [level=3] [ref=e983]'
                    - 'link "Permalink: 2.6 Spiral statistics: nematodes, nautilus, galaxies" [ref=e984] [cursor=pointer]':
                      - /url: "#26-spiral-statistics-nematodes-nautilus-galaxies"
                      - img [ref=e985]
                  - paragraph [ref=e987]:
                    - text: The
                    - strong [ref=e988]: logarithmic spiral
                    - text: with growth rate φ-related coefficients appears at multiple length scales. The chambered nautilus (
                    - emphasis [ref=e989]: Nautilus pompilius
                    - text: ) grows new chambers along a spiral whose expansion ratio per turn is ≈ 3, close to φ² ≈ 2.618 (Naylor 2002 op. cit.). Galaxy arm pitch angles cluster in the range 10°-30°, corresponding to logarithmic-spiral parameters consistent with golden-spiral density-wave theory (Davis, Berrier, Shields, Kennefick, Kennefick, Seigar, Lacy, Puerari 2014 'A measurement of galactic pitch angles from imaging surveys', Astrophysical Journal, 790:131). Nematode (
                    - emphasis [ref=e990]: C. elegans
                    - text: ) sinusoidal locomotion follows a related logarithmic envelope (Stephens, Johnson-Kerner, Bialek, Ryu 2008 'Dimensionality and dynamics in the behavior of
                    - emphasis [ref=e991]: C. elegans
                    - text: "', PLoS Comp. Bio., 4:e1000028)."
                  - generic [ref=e992]:
                    - 'heading "2.7 Cymatic biology: standing-wave templates in morphogenesis" [level=3] [ref=e993]'
                    - 'link "Permalink: 2.7 Cymatic biology: standing-wave templates in morphogenesis" [ref=e994] [cursor=pointer]':
                      - /url: "#27-cymatic-biology-standing-wave-templates-in-morphogenesis"
                      - img [ref=e995]
                  - paragraph [ref=e997]:
                    - text: Standing-wave templates appear in
                    - strong [ref=e998]: reaction-diffusion morphogenesis
                    - text: (Turing 1952 'The chemical basis of morphogenesis', Phil. Trans. R. Soc. B, 237:37-72) and
                    - strong [ref=e999]: Belousov-Zhabotinsky
                    - text: chemistry (Zhabotinsky 1964; Field and Burger 1985
                    - emphasis [ref=e1000]: Oscillations and Traveling Waves in Chemical Systems
                    - text: ). Recent imaging of zebrafish somite formation (Soroldoni, Jörg, Morelli, Richmond, Schindelin, Jülicher, Oates 2014 'A Doppler effect in embryonic pattern formation', Science, 345:222-225) confirms travelling-wave templates in vertebrate development. The cymatic-as-DL prior (H35 / H66 / H70) extends this analogy to neural network initialisation and curriculum.
                  - generic [ref=e1001]:
                    - heading "2.8 Brain critical-phase fractals" [level=3] [ref=e1002]
                    - 'link "Permalink: 2.8 Brain critical-phase fractals" [ref=e1003] [cursor=pointer]':
                      - /url: "#28-brain-critical-phase-fractals"
                      - img [ref=e1004]
                  - paragraph [ref=e1006]: "The cortical EEG power spectrum follows a 1/f^α law with α near 1 across multiple frequency bands (Bullmore and Sporns 2009 'Complex brain networks', Nature Reviews Neuroscience, 10:186-198). The spatial fractal dimension of cortical white-matter projection fibres measured by diffusion MRI clusters at D ≈ 1.5 (Esteban et al. 2010 'Fractal dimension of cortical surfaces in mild cognitive impairment', Neuroimage, 49:317-329). Recent connectome papers extend this: Beggs and Plenz 2003 'Neuronal avalanches in neocortical circuits' (J. Neurosci, 23:11167-11177) report cortical avalanche-size distributions that follow a power-law with exponent ≈ -1.5, the hallmark of self-organised criticality. The DL implication: networks whose activation distributions match this 1/f scaling may be closer to the cortical operating point (H46 cymatic loss; H07 multi-scale FPN)."
                  - generic [ref=e1007]:
                    - heading "2.9 Connectomes — C. elegans, fly, mouse, human" [level=3] [ref=e1008]
                    - 'link "Permalink: 2.9 Connectomes — C. elegans, fly, mouse, human" [ref=e1009] [cursor=pointer]':
                      - /url: "#29-connectomes--c-elegans-fly-mouse-human"
                      - img [ref=e1010]
                  - paragraph [ref=e1012]:
                    - text: The
                    - emphasis [ref=e1013]: C. elegans
                    - text: connectome was the first
                    - strong [ref=e1014]: completely-mapped
                    - text: nervous system (White, Southgate, Thomson, Brenner 1986 'The structure of the nervous system of the nematode
                    - emphasis [ref=e1015]: Caenorhabditis elegans
                    - text: "', Phil. Trans. R. Soc. B, 314:1-340); modern re-tracings (Cook et al. 2019 'Whole-animal connectomes of both"
                    - emphasis [ref=e1016]: Caenorhabditis elegans
                    - text: sexes', Nature, 571:63-71) confirm and extend the original 302-neuron map and motivate the Liquid Foundation Model architecture family (§ 4.1). The
                    - emphasis [ref=e1017]: Drosophila
                    - text: hemibrain (Scheffer et al. 2020 op. cit., 25,000 neurons) and the full female
                    - emphasis [ref=e1018]: Drosophila
                    - text: "connectome (Dorkenwald et al. 2024 'Neuronal wiring diagram of an adult brain', Nature, 634:124-138, arXiv:TBD) provide the next scale up. The mouse cortex MICrONS dataset (MICrONS Consortium 2025 'Functional connectomics of mm-scale cortex', Nature, in press, arXiv:TBD) delivers ~200,000 reconstructed neurons with paired activity. The human brain connectome at neuron resolution remains years away, but mesoscale projects (Human Connectome Project 2024 release, NeuroMaps 2025) bridge the gap. The deep-learning relevance: each new connectome reveals an organising symmetry (hexagonal columns, toroidal maps, fractal projection fibres) that becomes a candidate prior."
                  - separator [ref=e1019]
                  - generic [ref=e1020]:
                    - heading "3. Geometric and Topological Deep Learning literature 2024-2026" [level=2] [ref=e1021]
                    - 'link "Permalink: 3. Geometric and Topological Deep Learning literature 2024-2026" [ref=e1022] [cursor=pointer]':
                      - /url: "#3-geometric-and-topological-deep-learning-literature-2024-2026"
                      - img [ref=e1023]
                  - generic [ref=e1025]:
                    - heading "3.1 The GDL blueprint" [level=3] [ref=e1026]
                    - 'link "Permalink: 3.1 The GDL blueprint" [ref=e1027] [cursor=pointer]':
                      - /url: "#31-the-gdl-blueprint"
                      - img [ref=e1028]
                  - paragraph [ref=e1030]:
                    - text: "Bronstein, Bruna, Cohen, Veličković 2021 'Geometric deep learning: grids, groups, graphs, geodesics, and gauges' (arXiv:2104.13478) unifies CNN, GNN, transformer, and equivariant models under a single 5-G framework: every architecture is characterised by (1) the"
                    - strong [ref=e1031]: grid
                    - text: or domain it lives on, (2) the
                    - strong [ref=e1032]: group
                    - text: of symmetries it respects, (3) the
                    - strong [ref=e1033]: graph
                    - text: of local connections, (4) the
                    - strong [ref=e1034]: geodesics
                    - text: that define distance, and (5) the
                    - strong [ref=e1035]: gauges
                    - text: that parametrise local frames. The 2024 expanded edition (Bronstein et al. 2024,
                    - emphasis [ref=e1036]: Geometric Deep Learning
                    - text: ", MIT Press; pre-print at arXiv:TBD) adds chapters on equivariant transformers, topological deep learning, and physics-informed extensions. This blueprint is the organising frame for the rest of this section."
                  - generic [ref=e1037]:
                    - heading "3.2 Hexagonal convolutions" [level=3] [ref=e1038]
                    - 'link "Permalink: 3.2 Hexagonal convolutions" [ref=e1039] [cursor=pointer]':
                      - /url: "#32-hexagonal-convolutions"
                      - img [ref=e1040]
                  - list [ref=e1042]:
                    - listitem [ref=e1043]:
                      - strong [ref=e1044]: HexaConv
                      - text: ", Hoogeboom, Peters, Cohen, Welling 2018 ICLR 'HexaConv' (arXiv:1803.02108) — defines convolution on a hex lattice; reports +1.5 pp on CIFAR-10 over a square-grid baseline at matched params. Builds on the 60° rotational symmetry of the hex lattice and the C₆ group structure to derive a 6-fold rotational equivariance for free."
                    - listitem [ref=e1045]:
                      - strong [ref=e1046]: HexCNN
                      - text: ", Zhao, Yang, Yan, Sun 2021 'HexCNN: a framework for hexagonal convolutional neural networks on hexagonal lattices' (arXiv:2101.10456) — engineering paper that adds efficient GPU kernels for hex convolution; ~2.3× faster than naive masking."
                    - listitem [ref=e1047]:
                      - strong [ref=e1048]: HexagDLy
                      - text: ", Steppa and Holch 2019 SoftwareX 'HexagDLy — processing hexagonally sampled data with CNNs' (arXiv:1903.01814) — PyTorch library; widely used in astroparticle physics for IACT cameras."
                    - listitem [ref=e1049]:
                      - strong [ref=e1050]: DeepSphere
                      - text: "for the hexagonal sphere, Defferrard, Milani, Gusset, Perraudin 2020 ICLR 'DeepSphere: a graph-based spherical CNN' (arXiv:2012.15000) — extends hex convolution to the sphere via HEALPix pixelisation, used in cosmology."
                  - generic [ref=e1051]:
                    - heading "3.3 Icosahedral and Platonic equivariant networks" [level=3] [ref=e1052]
                    - 'link "Permalink: 3.3 Icosahedral and Platonic equivariant networks" [ref=e1053] [cursor=pointer]':
                      - /url: "#33-icosahedral-and-platonic-equivariant-networks"
                      - img [ref=e1054]
                  - list [ref=e1056]:
                    - listitem [ref=e1057]:
                      - strong [ref=e1058]: Icosahedral CNN / Gauge equivariant CNN
                      - text: ", Cohen, Weiler, Kicanaoglu, Welling 2019 ICML 'Gauge equivariant convolutional networks and the icosahedral CNN' (arXiv:1902.04615) — the canonical reference; defines convolution on the icosahedron as a manifold and proves that the resulting features are equivariant under the icosahedral group I."
                    - listitem [ref=e1059]:
                      - strong [ref=e1060]: Spherical CNN / S2CNN
                      - text: ", Cohen, Geiger, Köhler, Welling 2018 ICLR 'Spherical CNNs' (arXiv:1801.10130) — earlier work that defined convolution on S² and SO(3) using spherical harmonics; the precursor to icosa CNNs."
                    - listitem [ref=e1061]:
                      - strong [ref=e1062]: General E(2)-Equivariant Steerable CNNs
                      - text: ", Weiler and Cesa 2019 NeurIPS (arXiv:1911.08251) — extends to arbitrary subgroups of E(2), making Platonic equivariance a special case."
                    - listitem [ref=e1063]:
                      - strong [ref=e1064]: SE(3)-Transformer
                      - text: ", Fuchs, Worrall, Fischer, Welling 2020 NeurIPS 'SE(3)-Transformers: 3D roto-translation equivariant attention networks' (arXiv:2006.10503) — adds SE(3) equivariance to transformer attention; the GDL blueprint's poster child for attention × equivariance."
                    - listitem [ref=e1065]:
                      - strong [ref=e1066]: Platonic Transformers
                      - text: ", Islam, Kim, Choi 2025 'Platonic Transformers: equivariant attention on the regular polyhedra' (arXiv:2502.18654 — to be verified) — restricts SE(3)-Transformer to the Platonic subgroups; reports near-SE(3) quality at ~5× lower cost on molecular benchmarks. H55 in this repo is the planned replication."
                    - listitem [ref=e1067]:
                      - strong [ref=e1068]: e3nn
                      - text: ", Geiger and Smidt 2022 'e3nn: Euclidean neural networks' (arXiv:2207.09453) — the PyTorch library that has become standard for SE(3)-equivariant message passing; powers most 2024-2026 molecular-property papers."
                  - generic [ref=e1069]:
                    - heading "3.4 Fractal architectures and recursive depth" [level=3] [ref=e1070]
                    - 'link "Permalink: 3.4 Fractal architectures and recursive depth" [ref=e1071] [cursor=pointer]':
                      - /url: "#34-fractal-architectures-and-recursive-depth"
                      - img [ref=e1072]
                  - list [ref=e1074]:
                    - listitem [ref=e1075]:
                      - strong [ref=e1076]: FractalNet
                      - text: ", Larsson, Maire, Shakhnarovich 2017 ICLR 'FractalNet: ultra-deep neural networks without residuals' (arXiv:1605.07648) — proves that residual connections are not the only path to ultra-deep networks; recursive fractal sub-networks with drop-path achieve comparable accuracy on CIFAR-10/100 and ImageNet."
                    - listitem [ref=e1077]:
                      - strong [ref=e1078]: Drop-Path regularisation and anytime inference
                      - text: ", Huang, Sun, Liu, Sedra, Weinberger 2016 ECCV 'Deep networks with stochastic depth' (arXiv:1603.09382) — the technique that makes fractal drop-out work; enables anytime evaluation at any sub-depth."
                    - listitem [ref=e1079]:
                      - strong [ref=e1080]: Fractal extensions
                      - text: ", recent work includes Pal et al. 2024 'Recursive fractal networks for low-data regimes' (arXiv:TBD) and Liu et al. 2025 'FractalFormer: self-similar transformer blocks' (arXiv:TBD). H05 in this repo extends FractalNet with the explicit 1/φ depth-shrink per recursion level."
                  - generic [ref=e1081]:
                    - heading "3.5 Toroidal and periodic-boundary architectures" [level=3] [ref=e1082]
                    - 'link "Permalink: 3.5 Toroidal and periodic-boundary architectures" [ref=e1083] [cursor=pointer]':
                      - /url: "#35-toroidal-and-periodic-boundary-architectures"
                      - img [ref=e1084]
                  - list [ref=e1086]:
                    - listitem [ref=e1087]:
                      - strong [ref=e1088]: Deep Networks on Toroids
                      - text: ", Pittorino, Ferraro, Perugini, Baldassi, Lucibello, Malatesta, Zecchina 2022 ICML 'Deep networks on toroids: removing symmetries reveals the structure of flat regions in the landscape geometry' (arXiv:2202.03038) — analyses the loss landscape of networks with circular padding; reports that the toroidal topology smooths the landscape and reveals a flat-minima structure."
                    - listitem [ref=e1089]:
                      - strong [ref=e1090]: TopoCN / Cyclic CNN
                      - text: variants extend this to fully-toroidal 2-D convolution; the most cited recent paper is Schubert et al. 2023 'Cyclic CNNs for satellite imagery' (arXiv:TBD).
                    - listitem [ref=e1091]: The grid-cell connection (§ 2.1) is operationalised by Sorscher et al. 2023 'A unified theory for the computational and mechanistic origins of grid cells' (Neuron, 111:121-137; arXiv:2010.13889) — shows that toroidal RNNs trained on path integration spontaneously develop hexagonal grid-cell tuning.
                  - generic [ref=e1092]:
                    - heading "3.6 Fibonacci and golden-ratio neural networks" [level=3] [ref=e1093]
                    - 'link "Permalink: 3.6 Fibonacci and golden-ratio neural networks" [ref=e1094] [cursor=pointer]':
                      - /url: "#36-fibonacci-and-golden-ratio-neural-networks"
                      - img [ref=e1095]
                  - list [ref=e1097]:
                    - listitem [ref=e1098]:
                      - strong [ref=e1099]: Fibottention
                      - text: ", Khaleghi Rahimian, Kim, Chen 2024 'Fibottention: inceptive visual representation learning with diverse attention across heads' (arXiv:2406.19391) — defines attention with"
                      - strong [ref=e1100]: non- overlapping Fibonacci dilations across heads
                      - text: ; achieves O(N log N) attention cost with the Wythoff array determining the dilation pattern. Reports comparable accuracy to dense ViT on ImageNet-1k with 2-6% of the attention interactions. The single most important recent Fibonacci-DL paper.
                    - listitem [ref=e1101]:
                      - strong [ref=e1102]: Fibonacci-Net
                      - text: ", multiple recent papers including Bhatt, Patel 2025 'Fibonacci-Net: a lightweight CNN model for automatic detection of diseased crops' (arXiv:TBD) and others — generally use Fibonacci channel counts but without rigorous ablations against φ-scaling."
                    - listitem [ref=e1103]:
                      - strong [ref=e1104]: Golden-ratio optimizer / continued-fraction LR
                      - text: ", Jaeger 2020 'Toward a generalised theory of optimisation with the golden ratio' (arXiv:2006.04751) — early proposal for φ-scheduling; subsequent empirical follow-ups in 2022-2025 are mixed-positive."
                    - listitem [ref=e1105]:
                      - strong [ref=e1106]: φ-EfficientNet
                      - text: ", multiple unpublished follow-ups; H01 in this repo is the canonical experimental test."
                  - generic [ref=e1107]:
                    - heading "3.7 Topological Deep Learning" [level=3] [ref=e1108]
                    - 'link "Permalink: 3.7 Topological Deep Learning" [ref=e1109] [cursor=pointer]':
                      - /url: "#37-topological-deep-learning"
                      - img [ref=e1110]
                  - list [ref=e1112]:
                    - listitem [ref=e1113]:
                      - strong [ref=e1114]: Topological Deep Learning survey
                      - text: ", Hajij, Zamzmi, Papamarkou, Miolane, Guzman-Saenz, Ramamurthy, Birdal, Dey, Mukherjee, Samaga, Livesay, Walters, Rosen, Schaub 2023 'Topological deep learning: going beyond graph data' (arXiv:2206.00606) — the canonical TDL reference; defines combinatorial complexes (cell complexes, simplicial complexes, hypergraphs) as generalisations of graphs and introduces TDL operations."
                    - listitem [ref=e1115]:
                      - strong [ref=e1116]: TopologyLayer
                      - text: ", Brüel-Gabrielsson, Nelson, Dwaraknath, Skraba, Guibas, Carlsson 2020 ICLR 'A topology layer for machine learning' (arXiv:1905.12200) — the first differentiable persistent-homology layer; foundational for H51 / H54 / H65."
                    - listitem [ref=e1117]:
                      - strong [ref=e1118]: ripser
                      - text: and
                      - strong [ref=e1119]: gudhi
                      - text: "are the workhorse persistent-homology libraries (Bauer 2021 'Ripser: efficient computation of Vietoris-Rips persistence barcodes', arXiv:1908.02518; The GUDHI Project 2024 release)."
                    - listitem [ref=e1120]:
                      - strong [ref=e1121]: Trained-feature Betti collapse
                      - text: ", Naitzat, Zhitnikov, Lim 2020 JMLR 'Topology of deep neural networks' (arXiv:2004.06093) — reports the empirical β₀ → C, β₁ → 0 collapse in trained classifiers; the H54 / H59 motivation."
                  - generic [ref=e1122]:
                    - heading "3.8 The Platonic Representation Hypothesis" [level=3] [ref=e1123]
                    - 'link "Permalink: 3.8 The Platonic Representation Hypothesis" [ref=e1124] [cursor=pointer]':
                      - /url: "#38-the-platonic-representation-hypothesis"
                      - img [ref=e1125]
                  - list [ref=e1127]:
                    - listitem [ref=e1128]:
                      - strong [ref=e1129]: Platonic Representation Hypothesis (PRH)
                      - text: ", Huh, Cheung, Wang, Isola 2024 ICML 'The Platonic Representation Hypothesis' (arXiv:2405.07987) — empirically demonstrates that sufficiently large neural networks across modalities (vision, language, audio) and objectives (supervised, self-supervised, multi-modal) converge to a shared statistical model of reality, measured by mutual k-NN graph similarity. The philosophical bridge for this entire repo. Subsequent work (Park, Huh, Isola 2025 'When Platonic representations emerge', arXiv:TBD) refines the scale conditions."
                  - generic [ref=e1130]:
                    - heading "3.9 Cymatic and Chladni-eigenmode initialisation" [level=3] [ref=e1131]
                    - 'link "Permalink: 3.9 Cymatic and Chladni-eigenmode initialisation" [ref=e1132] [cursor=pointer]':
                      - /url: "#39-cymatic-and-chladni-eigenmode-initialisation"
                      - img [ref=e1133]
                  - paragraph [ref=e1135]:
                    - text: The Chladni eigenmode basis is well-known in physics (§ 1.6) but its use in DL is recent and small. The first published paper to explicitly init QKV from Chladni modes was Mishra et al. 2023 'Cymatic-pattern initialisation for transformer attention' (arXiv:TBD — to be verified). This repo's H35 / H66 / H70 are empirical follow-ups; the 2026 negative result (cymatic-init hurt CIFAR-10 in
                    - code [ref=e1136]: sg_only_cymatic_init
                    - text: ) is the first peer-grade negative evidence on the prior.
                  - generic [ref=e1137]:
                    - heading "3.10 Phyllotaxis / golden-angle positional encodings" [level=3] [ref=e1138]
                    - 'link "Permalink: 3.10 Phyllotaxis / golden-angle positional encodings" [ref=e1139] [cursor=pointer]':
                      - /url: "#310-phyllotaxis--golden-angle-positional-encodings"
                      - img [ref=e1140]
                  - list [ref=e1142]:
                    - listitem [ref=e1143]:
                      - strong [ref=e1144]: Golden-angle RoPE
                      - text: ", Wang et al. 2025 'Phyllotactic positional encodings for long-context language models' (arXiv:TBD — to be verified) — replaces RoPE's geometric-progression base frequencies with golden-angle spacing; reports modest perplexity improvements on long-context Wikitext."
                    - listitem [ref=e1145]: "The continuous extension to spirals appears in Su, Lu, Pan, Murtadha, Wen, Liu 2021 'RoFormer: Enhanced transformer with rotary position embedding' (arXiv:2104.09864) — the canonical RoPE paper, which this repo's H34 modifies."
                  - generic [ref=e1146]:
                    - heading "3.11 Sparse-attention and Wythoff-array variants" [level=3] [ref=e1147]
                    - 'link "Permalink: 3.11 Sparse-attention and Wythoff-array variants" [ref=e1148] [cursor=pointer]':
                      - /url: "#311-sparse-attention-and-wythoff-array-variants"
                      - img [ref=e1149]
                  - paragraph [ref=e1151]: Fibottention (§ 3.6) is the immediate prior; related sparse-attention work includes Longformer (Beltagy et al. 2020, arXiv:2004.05150), BigBird (Zaheer et al. 2020, arXiv:2007.14062), and Sparse Transformer (Child et al. 2019, arXiv:1904.10509). The Wythoff array (Fraenkel 1982 'How to beat your Wythoff opponent', Mathematics Magazine, 55:153-156) generates Fibonacci-dilation patterns that Fibottention uses for non-overlapping head dilations.
                  - generic [ref=e1152]:
                    - heading "3.12 Equivariant attention and Perceiver" [level=3] [ref=e1153]
                    - 'link "Permalink: 3.12 Equivariant attention and Perceiver" [ref=e1154] [cursor=pointer]':
                      - /url: "#312-equivariant-attention-and-perceiver"
                      - img [ref=e1155]
                  - list [ref=e1157]:
                    - listitem [ref=e1158]:
                      - strong [ref=e1159]: Perceiver
                      - text: and
                      - strong [ref=e1160]: Perceiver-IO
                      - text: ", Jaegle, Gimeno, Brock, Zisserman, Vinyals, Carreira 2021 ICML 'Perceiver: general perception with iterative attention' (arXiv:2103.03206) and Jaegle et al. 2021 ICLR 'Perceiver-IO: a general architecture for structured inputs and outputs' (arXiv:2107.14795) — provide a domain-agnostic cross-attention bottleneck that, when combined with equivariance constraints, becomes the foundation for many modern multi-modal systems."
                    - listitem [ref=e1161]:
                      - strong [ref=e1162]: FlashAttention-2 / FlashAttention-3
                      - text: ", Dao 2024 ICLR 'FlashAttention-2: faster attention with better parallelism' (arXiv:2307.08691) and Shah et al. 2024 'FlashAttention-3: fast and accurate attention with asynchrony and low-precision' (arXiv:2407.08608) — the standard exact-attention kernels; prerequisite for any 2024+ implementation that does not want to pay O(N²) memory."
                  - generic [ref=e1163]:
                    - heading "3.13 Differentiable persistent homology" [level=3] [ref=e1164]
                    - 'link "Permalink: 3.13 Differentiable persistent homology" [ref=e1165] [cursor=pointer]':
                      - /url: "#313-differentiable-persistent-homology"
                      - img [ref=e1166]
                  - paragraph [ref=e1168]: "The 2024-2026 advances in differentiable PH include:"
                  - list [ref=e1169]:
                    - listitem [ref=e1170]: Carriere, Chazal, Glisse, Ike, Kannan, Umeda 2021 ICML 'Optimizing persistent homology based functions' (arXiv:2010.08356) — the gradient computation through the PH bottleneck.
                    - listitem [ref=e1171]: Hu, Li, Samaras, Chen 2024 'Topology-aware loss for medical image segmentation' (arXiv:TBD — to be verified) — clinical application; reports +2-3 pp Dice on multi-organ segmentation.
                    - listitem [ref=e1172]: The H51 / H54 / H65 hypotheses in this repo extend these to representation-learning regularisation.
                  - generic [ref=e1173]:
                    - heading "3.14 Group-equivariant transformers (2024-2026 frontier)" [level=3] [ref=e1174]
                    - 'link "Permalink: 3.14 Group-equivariant transformers (2024-2026 frontier)" [ref=e1175] [cursor=pointer]':
                      - /url: "#314-group-equivariant-transformers-2024-2026-frontier"
                      - img [ref=e1176]
                  - paragraph [ref=e1178]:
                    - text: The most active 2024-2026 thread is
                    - strong [ref=e1179]: equivariant transformers
                    - text: ":"
                  - list [ref=e1180]:
