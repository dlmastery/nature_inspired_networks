    - paragraph [ref=e46]: "Allocating a fixed total parameter budget B across network stages in the ratio 1 : phi : phi**2 : phi**3 yields a Pareto point dominating uniform or geometric-2 allocation at iso-FLOPs."
    - heading "Motivation" [level=3] [ref=e47]
    - paragraph [ref=e48]: "When a fixed resource budget must be split across a hierarchy of processing stages, the optimal allocation depends on how the marginal returns of each stage compare. For deep networks, deeper stages process more abstract features that have higher information content per parameter (because they integrate larger receptive fields). The phi recurrence phi**(k+1) = phi**k + phi**(k-1) means that allocating budget in proportion to phi**k automatically gives each stage exactly the sum of what the two prior stages received, mirroring the biological resource-inheritance rule (mollusc shells, ammonite chambers, plant internodes). The total budget is then B = sum_{k=0}^{K} phi**k = (phi**(K+1) - 1) / (phi - 1), which gives a closed-form allocator: stage k receives B * (phi - 1) * phi**k / (phi**(K+1) - 1). This is fundamentally different from the linear, geometric-2, or EfficientNet-style allocations and provides a parameter-efficient hierarchy where each stage's expressive capacity is mathematically locked to the sum of the previous two stages."
    - heading "Formal hypothesis" [level=3] [ref=e49]
    - paragraph [ref=e50]: "Because golden-proportion parameter budget allocation (1 : phi : phi**2 : phi**3) per stage assigns each stage's capacity to be the sum of the two prior stages, the mechanism by which it should dominate uniform or geometric-2 allocation at fixed total budget B is that the hierarchical information-integration cost grows as phi**k (matching biological resource inheritance) per Tan and Le 2019. We expect a Pareto point on CIFAR-100 at +0.3 to +0.8 pp top-1 at iso-FLOPs vs uniform allocation."
